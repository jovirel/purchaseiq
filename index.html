<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PurchaseIQ</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── BRAND TOKENS ─────────────────────────────────────────── */
:root {
  /* Takumii = warm orange */
  --tak-primary: #D95F2B;
  --tak-light:   #FFF3EE;
  --tak-mid:     #F9C9B0;
  --tak-dark:    #8B3210;

  /* Daily Squeeze = golden yellow */
  --sq-primary:  #E8A910;
  --sq-light:    #FFFBEE;
  --sq-mid:      #FAE28A;
  --sq-dark:     #8B6200;

  /* Neutrals */
  --bg:       #F5F4F1;
  --surface:  #FFFFFF;
  --surface2: #F9F8F6;
  --border:   #E8E5DF;
  --border2:  #D4CFC6;
  --text:     #1A1714;
  --text2:    #5C564E;
  --muted:    #9E9790;

  /* Category colors */
  --cogs:  #2A7D4F;
  --asset: #1A5FA8;
  --opex:  #8B3DB5;

  /* Active brand (defaults to takumii) */
  --primary:  var(--tak-primary);
  --light:    var(--tak-light);
  --mid:      var(--tak-mid);
  --dark:     var(--tak-dark);

  --r: 14px;
  --shadow: 0 2px 12px rgba(0,0,0,.07);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.10);
}
.brand-squeeze {
  --primary: var(--sq-primary);
  --light:   var(--sq-light);
  --mid:     var(--sq-mid);
  --dark:    var(--sq-dark);
}

/* ── RESET ────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased;}

/* ── TOPBAR ───────────────────────────────────────────────── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
  box-shadow:0 1px 8px rgba(0,0,0,.05);
  gap:12px;
}
.logo{
  font-family:'Playfair Display',serif;
  font-weight:700;font-size:20px;letter-spacing:-.3px;
  color:var(--text);white-space:nowrap;
}
.logo em{color:var(--primary);font-style:italic;}

.brand-sw{display:flex;gap:6px;flex-shrink:0;}
.bbtn{
  padding:7px 16px;border-radius:20px;
  border:1.5px solid var(--border2);
  background:transparent;color:var(--muted);
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:11px;font-weight:700;cursor:pointer;
  transition:all .22s;letter-spacing:.6px;
}
.bbtn.on[data-b="takumii"]{
  background:var(--tak-primary);color:#fff;
  border-color:var(--tak-primary);
  box-shadow:0 3px 12px rgba(217,95,43,.35);
}
.bbtn.on[data-b="squeeze"]{
  background:var(--sq-primary);color:#fff;
  border-color:var(--sq-primary);
  box-shadow:0 3px 12px rgba(232,169,16,.35);
}

/* ── TABS ─────────────────────────────────────────────────── */
.tabs{
  display:flex;background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 20px;overflow-x:auto;
  scrollbar-width:none;
  position:sticky;top:57px;z-index:99;
}
.tabs::-webkit-scrollbar{display:none;}
.tab{
  padding:13px 16px;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:12px;font-weight:700;
  color:var(--muted);cursor:pointer;border:none;
  background:transparent;
  border-bottom:2.5px solid transparent;
  white-space:nowrap;transition:all .2s;letter-spacing:.3px;
}
.tab.on{color:var(--primary);border-bottom-color:var(--primary);}

/* ── PAGES ────────────────────────────────────────────────── */
.page{display:none;padding:20px;max-width:600px;margin:0 auto;}
.page.on{display:block;}

/* ── SECTION LABEL ────────────────────────────────────────── */
.sec{
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:10px;font-weight:800;
  letter-spacing:2px;color:var(--muted);
  text-transform:uppercase;margin-bottom:14px;
}

/* ── CARDS ────────────────────────────────────────────────── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:18px;margin-bottom:14px;
  box-shadow:var(--shadow);
}
.card2{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px;margin-bottom:8px;
}

/* ── BUTTONS ──────────────────────────────────────────────── */
.btn{
  padding:11px 20px;border-radius:10px;border:none;
  cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:12px;font-weight:700;
  letter-spacing:.3px;
  transition:all .18s;
  display:inline-flex;align-items:center;gap:7px;
}
.btn-p{
  background:var(--primary);color:#fff;
  box-shadow:0 3px 10px rgba(0,0,0,.15);
}
.btn-p:hover{filter:brightness(1.08);transform:translateY(-1px);}
.btn-p:active{transform:translateY(0);}
.btn-g{
  background:var(--surface2);color:var(--text2);
  border:1px solid var(--border2);
}
.btn-g:hover{background:var(--border);color:var(--text);}
.btn-d{
  background:#FFF0F0;color:#C0392B;
  border:1px solid #F5C6C6;
}
.btn-d:hover{background:#FFE0E0;}
.btn-s{padding:7px 13px;font-size:11px;border-radius:8px;}
.btn-full{width:100%;justify-content:center;}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;}

/* ── INPUTS ───────────────────────────────────────────────── */
.fl{display:flex;flex-direction:column;gap:5px;margin-bottom:13px;}
.fl label{
  font-size:10px;font-family:'Plus Jakarta Sans',sans-serif;
  font-weight:800;letter-spacing:1.2px;
  color:var(--muted);text-transform:uppercase;
}
.fl input,.fl select,.fl textarea{
  background:var(--surface2);
  border:1.5px solid var(--border);
  border-radius:9px;color:var(--text);
  padding:10px 13px;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:13px;width:100%;
  transition:border-color .2s,box-shadow .2s;
}
.fl input:focus,.fl select:focus,.fl textarea:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 3px color-mix(in srgb,var(--primary) 15%,transparent);
}
.fl select option{background:var(--surface);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* ── UPLOAD ZONE ──────────────────────────────────────────── */
.upzone{
  border:2px dashed var(--border2);
  border-radius:var(--r);
  padding:30px 20px;text-align:center;cursor:pointer;
  transition:all .22s;margin-bottom:14px;
  position:relative;background:var(--surface2);
}
.upzone:hover{border-color:var(--primary);background:var(--light);}
.upzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upzone .icon{font-size:30px;margin-bottom:10px;}
.upzone strong{display:block;font-size:14px;font-weight:700;margin-bottom:4px;color:var(--text);}
.upzone p{color:var(--muted);font-size:12px;}
.preview-img{
  width:100%;max-height:180px;object-fit:contain;
  border-radius:10px;margin-bottom:12px;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
}

/* ── STATUS MESSAGES ──────────────────────────────────────── */
.msg{padding:11px 15px;border-radius:10px;font-size:13px;margin-bottom:13px;display:none;font-weight:500;}
.msg.info{background:#EEF4FF;color:#1A5FA8;border:1px solid #BDD3F5;}
.msg.ok{background:#EDFAF3;color:#2A7D4F;border:1px solid #B2E5CB;}
.msg.err{background:#FFF0F0;color:#C0392B;border:1px solid #F5C6C6;}

/* ── CATEGORY BADGES ──────────────────────────────────────── */
.badge{
  display:inline-block;padding:3px 9px;border-radius:5px;
  font-size:10px;font-family:'Plus Jakarta Sans',sans-serif;
  font-weight:700;letter-spacing:.3px;
}
.b-cogs{background:#EDFAF3;color:var(--cogs);}
.b-asset{background:#EEF4FF;color:var(--asset);}
.b-opex{background:#F6EEFF;color:var(--opex);}

/* ── EXTRACTED ITEMS ──────────────────────────────────────── */
.ex-item{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:12px;margin-bottom:8px;
}
.ex-grid{
  display:grid;grid-template-columns:1fr 65px 105px auto;
  gap:8px;align-items:center;margin-bottom:8px;
}
.ex-item input,.ex-item select{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:7px;color:var(--text);
  padding:8px 10px;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;width:100%;
}
.ex-item input:focus,.ex-item select:focus{outline:none;border-color:var(--primary);}
.rmv{
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:18px;padding:2px 7px;border-radius:6px;
  transition:all .15s;line-height:1;
}
.rmv:hover{color:#C0392B;background:#FFF0F0;}

/* ── MANUAL ROWS ──────────────────────────────────────────── */
.mr{
  display:grid;grid-template-columns:1fr 58px 95px 110px auto;
  gap:7px;align-items:center;margin-bottom:8px;
}
.mr input,.mr select{
  background:var(--surface2);border:1.5px solid var(--border);
  border-radius:7px;color:var(--text);
  padding:9px 10px;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;width:100%;
}
.mr input:focus,.mr select:focus{outline:none;border-color:var(--primary);}

/* ── TOTAL BAR ────────────────────────────────────────────── */
.totalbar{
  background:var(--light);
  border:1.5px solid var(--mid);
  border-radius:var(--r);
  padding:16px 18px;
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:14px;
}
.totalbar .lbl{
  font-size:10px;font-family:'Plus Jakarta Sans',sans-serif;
  font-weight:800;letter-spacing:1.5px;color:var(--dark);text-transform:uppercase;
}
.totalbar .amt{
  font-family:'Playfair Display',serif;
  font-size:24px;font-weight:700;color:var(--primary);
}

/* ── HISTORY CARDS ────────────────────────────────────────── */
.pcard{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:16px;margin-bottom:10px;
  cursor:pointer;transition:all .2s;
  box-shadow:var(--shadow);
}
.pcard:hover{border-color:var(--primary);box-shadow:var(--shadow-lg);transform:translateY(-1px);}
.pcard-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.pdate{
  font-size:11px;color:var(--muted);font-weight:600;
  font-family:'Plus Jakarta Sans',sans-serif;
}
.ptotal{
  font-family:'Playfair Display',serif;
  font-size:17px;font-weight:700;color:var(--primary);
}
.psup{font-size:12px;color:var(--text2);margin-bottom:9px;font-weight:500;}
.chips{display:flex;flex-wrap:wrap;gap:4px;}
.chip{
  font-size:10px;padding:3px 9px;border-radius:8px;
  background:var(--surface2);color:var(--text2);
  font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;
  border:1px solid var(--border);
}
.pdetail{
  display:none;margin-top:12px;
  background:var(--surface2);border-radius:10px;padding:12px;
  border:1px solid var(--border);
}
.pdetail.open{display:block;}
.drow{
  display:grid;grid-template-columns:1fr auto auto auto;
  gap:8px;font-size:12px;padding:7px 0;
  border-bottom:1px solid var(--border);align-items:center;
}
.drow:last-child{border:none;}

/* ── SUMMARY ──────────────────────────────────────────────── */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.scard{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:16px;
  box-shadow:var(--shadow);
}
.slbl{
  font-size:10px;font-family:'Plus Jakarta Sans',sans-serif;
  font-weight:800;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);margin-bottom:7px;
}
.sval{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;}
.sval.c{color:var(--cogs);}
.sval.a{color:var(--asset);}
.sval.o{color:var(--opex);}
.sval.t{color:var(--primary);font-size:24px;}

/* ── ITEMS PAGE ───────────────────────────────────────────── */
.irow{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:13px 15px;margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:var(--shadow);transition:border-color .2s;
}
.irow:hover{border-color:var(--primary);}
.iname{font-size:13px;font-weight:600;margin-bottom:4px;color:var(--text);}

/* ── FILTER BAR ───────────────────────────────────────────── */
.fbar{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;margin-bottom:16px;align-items:end;}

/* ── SPINNER ──────────────────────────────────────────────── */
.spin{
  width:16px;height:16px;
  border:2px solid var(--border2);
  border-top-color:var(--primary);
  border-radius:50%;
  animation:sp .6s linear infinite;
  display:inline-block;vertical-align:middle;
}
@keyframes sp{to{transform:rotate(360deg);}}

/* ── EMPTY STATE ──────────────────────────────────────────── */
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty .ei{font-size:32px;margin-bottom:10px;}
.empty p{font-size:13px;font-weight:500;}

/* ── MODE TOGGLE ──────────────────────────────────────────── */
.mode-row{display:flex;gap:8px;margin-bottom:16px;}

/* ── CONN BADGE ───────────────────────────────────────────── */
.conn{
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:10px;font-weight:700;
  padding:4px 10px;border-radius:20px;letter-spacing:.3px;
}
.conn.ok{background:#EDFAF3;color:var(--cogs);}
.conn.err{background:#FFF0F0;color:#C0392B;}
.conn.loading{background:#EEF4FF;color:var(--asset);}

/* ── EDIT MODAL ───────────────────────────────────────────── */
.modal-backdrop{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.4);
  backdrop-filter:blur(4px);
  z-index:200;align-items:center;justify-content:center;padding:20px;
}
.modal-box{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;padding:22px;
  width:100%;max-width:380px;
  box-shadow:var(--shadow-lg);
}

/* ── DIVIDER ──────────────────────────────────────────────── */
.divider{height:1px;background:var(--border);margin:16px 0;}

/* ── AI BADGE ─────────────────────────────────────────────── */
.ai-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:linear-gradient(135deg,#667eea22,#764ba222);
  border:1px solid #667eea44;
  color:#5a52cc;
  font-size:10px;font-weight:700;
  padding:3px 10px;border-radius:20px;
  letter-spacing:.5px;
}

/* ── SCROLL ───────────────────────────────────────────────── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Purchase<em>IQ</em></div>
  <div style="display:flex;align-items:center;gap:8px;">
    <span class="conn loading" id="conn-badge">⟳ connecting</span>
    <div class="brand-sw">
      <button class="bbtn on" data-b="takumii" onclick="setBrand('takumii')">TAKUMII</button>
      <button class="bbtn" data-b="squeeze" onclick="setBrand('squeeze')">SQUEEZE</button>
    </div>
  </div>
</div>

<div id="brand-strip" style="height:4px;background:var(--tak-primary);transition:background .3s;"></div>
<div class="tabs">
  <button class="tab on" onclick="setTab('log',this)">+ Log</button>
  <button class="tab" onclick="setTab('history',this)">History</button>
  <button class="tab" onclick="setTab('summary',this)">Summary</button>
  <button class="tab" onclick="setTab('items',this)">Items List</button>
</div>

<!-- LOG PAGE -->
<div id="pg-log" class="page on">
  <p class="sec">New Purchase</p>
  <div class="mode-row">
    <button class="btn btn-p btn-s" id="mb-photo" onclick="setMode('photo')">📷 Upload Screenshot</button>
    <button class="btn btn-g btn-s" id="mb-manual" onclick="setMode('manual')">✏️ Manual Entry</button>
  </div>

  <!-- PHOTO -->
  <div id="m-photo">
    <div class="upzone" id="upzone">
      <input type="file" accept="image/*,application/pdf" multiple id="file-input">
      <div class="icon">📄</div>
      <strong>Upload Invoice(s)</strong>
      <p>Images or PDF — select multiple at once</p>
    </div>
    <div id="preview-wrap" style="display:none;">
      <img id="preview-img" class="preview-img" alt="">
      <button class="btn btn-p btn-full" id="analyze-btn" onclick="analyzeImage()">✨ Analyze with AI</button>
    </div>
  </div>

  <!-- MANUAL -->
  <div id="m-manual" style="display:none;">
    <div id="manual-rows">
      <div class="mr">
        <input type="text" placeholder="Item name" class="mn">
        <input type="number" placeholder="Qty" class="mq" value="1" min="1">
        <input type="number" placeholder="Price (Rp)" class="mp" min="0">
        <select class="mc">
          <option value="COGS">📦 COGS</option>
          <option value="Equipment">🔧 Equipment</option>
          <option value="OPEX">📋 OPEX</option>
        </select>
        <button class="rmv" onclick="rmRow(this)">×</button>
      </div>
    </div>
    <button class="btn btn-g btn-s" onclick="addRow()" style="margin-bottom:14px;">+ Add Row</button>
  </div>

  <div class="msg" id="status"></div>

  <!-- EXTRACTED -->
  <div id="extracted" style="display:none;">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <span class="sec" style="margin:0;">Extracted Items</span>
        <span class="ai-badge">✦ AI READ</span>
      </div>
      <div id="ex-list"></div>
    </div>
  </div>

  <div class="grid2" style="margin-bottom:12px;">
    <div class="fl" style="margin:0;">
      <label>Purchase Date</label>
      <input type="date" id="p-date">
    </div>
    <div class="fl" style="margin:0;">
      <label>Supplier</label>
      <div style="display:flex;gap:6px;">
        <select id="p-sup" style="flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;color:var(--text);padding:10px 12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;">
          <option value="">— Select Supplier —</option>
        </select>
        <button class="btn btn-g btn-s" onclick="openAddSupplier()" style="height:42px;flex-shrink:0;padding:0 12px;">+ New</button>
      </div>
    </div>
  </div>
  <div class="fl">
    <label>Notes (optional)</label>
    <input type="text" id="p-notes" placeholder="Any notes">
  </div>

  <!-- Add Supplier Modal -->
  <div id="supplier-modal" class="modal-backdrop">
    <div class="modal-box">
      <p class="sec" style="margin-bottom:14px;">Add New Supplier</p>
      <div class="fl"><label>Supplier Name</label><input type="text" id="new-sup-name" placeholder="e.g. MAX CORP GLOBAL, PT"></div>
      <div class="fl"><label>Platform / Notes</label><input type="text" id="new-sup-note" placeholder="e.g. Shopee, Direct, WhatsApp"></div>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="btn btn-p" style="flex:1;justify-content:center;" onclick="saveSupplier()">Save</button>
        <button class="btn btn-g" style="flex:1;justify-content:center;" onclick="closeSupplier()">Cancel</button>
      </div>
    </div>
  </div>

  <div class="totalbar">
    <span class="lbl">Total Amount</span>
    <span class="amt" id="tot">Rp 0</span>
  </div>
  <button class="btn btn-p btn-full" id="save-btn" onclick="savePurchase()">💾 Save Purchase</button>
</div>

<!-- HISTORY PAGE -->
<div id="pg-history" class="page">
  <p class="sec">History — <span id="h-brand">TAKUMII</span></p>
  <div class="fbar">
    <div class="fl" style="margin:0;"><label>From</label><input type="date" id="h-from"></div>
    <div class="fl" style="margin:0;"><label>To</label><input type="date" id="h-to"></div>
    <button class="btn btn-g" style="height:38px;align-self:end;" onclick="loadHistory()">Go</button>
  </div>
  <div id="history-list"></div>
</div>

<!-- SUMMARY PAGE -->
<div id="pg-summary" class="page">
  <p class="sec">Summary — <span id="s-brand">TAKUMII</span></p>
  <div class="fbar">
    <div class="fl" style="margin:0;"><label>From</label><input type="date" id="s-from"></div>
    <div class="fl" style="margin:0;"><label>To</label><input type="date" id="s-to"></div>
    <button class="btn btn-g" style="height:38px;align-self:end;" onclick="loadSummary()">Go</button>
  </div>
  <div id="summary-out"></div>
</div>

<!-- ITEMS PAGE -->
<div id="pg-items" class="page">
  <p class="sec">Items Catalog — <span id="i-brand">TAKUMII</span></p>
  <div class="card">
    <p class="sec" style="margin-bottom:12px;">Add Item</p>
    <div class="grid2" style="margin-bottom:10px;">
      <div class="fl" style="margin:0;"><label>Name</label><input type="text" id="ni-name" placeholder="e.g. Rice Paper"></div>

// ─── SUPABASE HELPERS ───────────────────────────────────────────────────────
async function sbFetch(path, opts={}) {
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
    ...opts,
    headers: {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || '',
      ...opts.headers
    }
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function dbSelect(table, filter='') {
  return await sbFetch(`${table}?${filter}`);
}
async function dbInsert(table, data) {
  return await sbFetch(table, {
    method:'POST', prefer:'return=representation',
    body: JSON.stringify(data)
  });
}
async function dbDelete(table, filter) {
  return await sbFetch(`${table}?${filter}`, {method:'DELETE'});
}

// ─── AI ANALYZE (GEMINI) ─────────────────────────────────────────────────────
async function analyzeImage() {
  if (!imgData) return;
  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Analyzing…';
  showMsg('info', '🤖 Gemini is reading your screenshot…');

  try {
    // Get catalog for context
    let catalogStr = '';
    try {
      const cat = await dbSelect('catalog', `brand=eq.${brand}&select=name,category`);
      catalogStr = cat.map(i=>`${i.name} (${i.category})`).join(', ');
    } catch(e) {}

    const imagesToProcess = pendingImages.length > 0 ? pendingImages : [{dataUrl: imgData, name: 'screenshot'}];
    let allItems = [];

    for (let imgIdx = 0; imgIdx < imagesToProcess.length; imgIdx++) {
      const currentImg = imagesToProcess[imgIdx];
      btn.innerHTML = imagesToProcess.length > 1
        ? `<span class="spin"></span> Analyzing ${imgIdx+1} of ${imagesToProcess.length}…`
        : '<span class="spin"></span> Analyzing…';
      showMsg('info', `🤖 Analyzing screenshot ${imgIdx+1} of ${imagesToProcess.length}…`);

    const isPdf = currentImg.isPdf;
    const mimeType = currentImg.dataUrl.split(';')[0].split(':')[1];
    const base64 = currentImg.dataUrl.split(',')[1];

    const prompt = `You are a purchase invoice analyzer for an F&B business in Indonesia.
The document may be a Shopee screenshot (multiple sellers) or a PDF/supplier invoice.

YOUR JOB:
1. Detect the SUPPLIER NAME from the document header
2. For Shopee screenshots: one entry per seller block, price = total per seller block, qty=1
3. For PDF invoices: one entry per line item, price = Amount column (line total), extract actual qty and unit_g

OUTPUT FORMAT (return ALL fields):
[{"name":"catalog name","seller":"store name","detected_supplier":"company name","supplier_confidence":"high","supplier_note":"","qty":1,"unit_g":1000,"price":149951,"category":"COGS","confidence":"high","note":""}]

KNOWN CATALOG (COGS only, fuzzy match Indonesian/English):
${catalogStr || 'none'}

CATALOG MATCHING EXAMPLES:
"Royal Chocolate 1Kg" → "Chocolate Powder" | "Teh Solo 1kg" → "Teh Solo Powder"
"Lychee Tea 1Kg" → "Lychee Tea Powder" | "Apple Tea 1Kg" → "Apple Tea Powder"
"Nescafe Classic 45gr" → "Nescafe" | "Javaland Bubuk Creamer" → "Creamer"
"Tobiko 50gr HIKARU" → "Tobico" | "Jeruk Sunkist" → "Jeruk Sunkist"

CATEGORIZATION:
- COGS: fuzzy matches catalog above only — use catalog name
- OPEX: cleaning, mops, tape, office items, services
- Equipment: machines, scales, tools

UNIT SIZE (unit_g): extract from name: "1Kg"=1000, "500gr"=500, "1L"=1000, "250ml"=250. Null if unclear.

PRICE: Remove Indonesian dots: Rp1.093.265 → 1093265, Rp40.020 → 40020
- Shopee: use "Total N produk: RpXXX" per seller block
- PDF: use Amount column per line item

SUPPLIER:
- Shopee screenshot → detected_supplier:"Shopee", supplier_confidence:"high"
- PDF → find company name in header (e.g. "MAX CORP GLOBAL, PT"), supplier_confidence:"high"
- Unclear → supplier_confidence:"low", add supplier_note

CONFIDENCE: high=certain, medium=likely (add note), low=unsure (add note)

Return ONLY raw JSON array, no markdown, no backticks.`;

    const body = {
      contents: [{
        parts: [
          { inline_data: { mime_type: mimeType, data: base64 } },
          { text: prompt }
        ]
      }],
      generationConfig: { temperature: 0.1, maxOutputTokens: 2000 }
    };

    const res = await fetch(GEMINI_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'Gemini error');

    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '[]';
    let items;
    try {
      const clean = raw.replace(/```json|```/g,'').trim();
      items = JSON.parse(clean);
    } catch(e) {
      const match = raw.match(/\[[\s\S]*\]/);
      items = match ? JSON.parse(match[0]) : [];
    }

    if (items.length) {
        allItems = allItems.concat(items);
      }
    } // end for loop

    if (!allItems.length) {
      showMsg('err', '⚠️ Could not extract items. Try a clearer screenshot or PDF.');
    } else {
      // Auto-set supplier from AI detection
      const firstWithSupplier = allItems.find(i => i.detected_supplier && i.supplier_confidence !== 'low');
      if (firstWithSupplier) {
        const supSel = document.getElementById('p-sup');
        const opts = Array.from(supSel.options).map(o => o.value.toLowerCase());
        const detected = firstWithSupplier.detected_supplier;
        const match = Array.from(supSel.options).find(o => o.value.toLowerCase().includes(detected.toLowerCase().substring(0,6)));
        if (match) {
          supSel.value = match.value;
        } else {
          // Highlight supplier field — not in list yet
          allItems._suggestedSupplier = detected;
          allItems._supplierConfidence = firstWithSupplier.supplier_confidence;
        }
      }

      // Fetch last buy prices for comparison
      for (let i = 0; i < allItems.length; i++) {
        if (allItems[i].category === 'COGS' && allItems[i].name) {
          const last = await getLastBuyPrice(allItems[i].name);
          if (last) {
            allItems[i]._lastTotal = last.last_total;
            allItems[i]._lastPricePerG = last.price_per_g;
            allItems[i]._lastDate = last.last_date;
            allItems[i]._lastUnitG = last.unit_g;
          }
        }
      }

      exItems = allItems;
      renderExtracted();
      const imgCount = imagesToProcess.length;
      const warnCount = allItems.filter(i => i.confidence !== 'high' || i.supplier_confidence === 'low').length;
      showMsg('ok', `✓ Extracted ${allItems.length} item(s) from ${imgCount} file(s).${warnCount ? ' ⚠️ '+warnCount+' item(s) need review.' : ''}`);
    }
  } catch(e) {
    showMsg('err', '❌ ' + (e.message || 'Error analyzing image.'));
    console.error(e);
  }

  btn.disabled = false;
  btn.innerHTML = '✨ Re-analyze';
}

// ─── RENDER EXTRACTED ────────────────────────────────────────────────────────
function renderExtracted() {
  const el = document.getElementById('ex-list');
  el.innerHTML = '';

  // Show suggested supplier warning if not in list
  if (exItems._suggestedSupplier) {
    el.innerHTML += `<div style="background:#FFFBEE;border:1.5px solid var(--sq-mid);border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:12px;">
      ⚠️ <strong>Supplier detected:</strong> ${esc(exItems._suggestedSupplier)} — not in your supplier list yet.
      <button class="btn btn-g btn-s" style="margin-left:8px;" onclick="openAddSupplier('${esc(exItems._suggestedSupplier)}')">+ Add Supplier</button>
    </div>`;
  }

  exItems.forEach((item, i) => {
    const d = document.createElement('div');
    d.className = 'ex-item';

    // Confidence badge
    const confColor = item.confidence==='high' ? 'var(--cogs)' : item.confidence==='medium' ? '#E8A910' : '#C0392B';
    const confBg = item.confidence==='high' ? '#EDFAF3' : item.confidence==='medium' ? '#FFFBEE' : '#FFF0F0';
    const confLabel = item.confidence==='high' ? '✓ matched' : item.confidence==='medium' ? '⚡ check' : '⚠️ unsure';

    // Price comparison
    let priceHtml = '';
    if (item._lastTotal && item.price && item.category === 'COGS') {
      const pctChange = ((item.price - item._lastTotal) / item._lastTotal) * 100;
      const pctRounded = pctChange.toFixed(1);
      const sign = pctChange >= 0 ? '+' : '';
      const isAlert = Math.abs(pctChange) >= 20;
      const priceBg = isAlert ? (pctChange > 0 ? '#FFF0F0' : '#EDFAF3') : '#F9F8F6';
      const priceColor = isAlert ? (pctChange > 0 ? '#C0392B' : 'var(--cogs)') : 'var(--muted)';
      const priceIcon = pctChange > 0 ? '↑' : '↓';
      priceHtml = `<div style="font-size:11px;background:${priceBg};border-radius:6px;padding:6px 10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">
        <span style="color:var(--muted);">Last buy: <strong>Rp ${fmt(item._lastTotal)}</strong> on ${item._lastDate||'?'}</span>
        <span style="font-weight:700;color:${priceColor};">${priceIcon} ${sign}${pctRounded}%${isAlert?' ⚠️':''}</span>
      </div>`;
      if (isAlert) {
        const dir = pctChange > 0 ? 'HIGHER' : 'LOWER';
        priceHtml += `<div style="font-size:11px;color:${pctChange>0?'#C0392B':'var(--cogs)'};background:${priceBg};border:1px solid ${pctChange>0?'#F5C6C6':'#B2E5CB'};border-radius:6px;padding:6px 10px;margin-bottom:8px;">
          ${pctChange>0?'🔴':'🟢'} Price is ${Math.abs(pctRounded)}% ${dir} than last purchase — please verify
        </div>`;
      }
    } else if (!item._lastTotal && item.category === 'COGS') {
      priceHtml = `<div style="font-size:11px;color:var(--muted);background:var(--surface2);border-radius:6px;padding:5px 10px;margin-bottom:8px;">🆕 First purchase — will set as baseline price</div>`;
    }

    // Unit size field for COGS
    const unitHtml = item.category === 'COGS' ? `
      <div style="display:flex;gap:8px;align-items:center;margin-top:8px;">
        <span style="font-size:11px;color:var(--muted);white-space:nowrap;">Unit size (g/ml):</span>
        <input type="number" value="${item.unit_g||''}" placeholder="e.g. 1000" min="0"
          onchange="exItems[${i}].unit_g=parseInt(this.value)||null"
          style="width:100px;background:var(--surface);border:1.5px solid var(--border);border-radius:6px;color:var(--text);padding:5px 8px;font-size:12px;">
        <span style="font-size:11px;color:var(--muted);">× ${item.qty||1} = ${fmt((item.unit_g||0)*(item.qty||1))}g total</span>
      </div>` : '';

    d.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-size:10px;color:var(--muted);font-weight:600;">${esc(item.seller||item.detected_supplier||'')}</span>
        <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:${confBg};color:${confColor};">${confLabel}</span>
      </div>
      ${item.note ? `<div style="font-size:11px;color:#8B3DB5;background:#F6EEFF;border:1px solid #D4A8F5;border-radius:6px;padding:6px 10px;margin-bottom:8px;">💡 ${esc(item.note)}</div>` : ''}
      ${priceHtml}
      <div class="ex-grid">
        <input type="text" value="${esc(item.name)}" placeholder="Item name" onchange="exItems[${i}].name=this.value;calcTotal()">
        <input type="number" value="${item.qty||1}" min="1" placeholder="Qty" onchange="exItems[${i}].qty=parseInt(this.value)||1;calcTotal()">
        <input type="number" value="${item.price||''}" min="0" placeholder="Total (Rp)" onchange="exItems[${i}].price=parseInt(this.value)||0;calcTotal()">
        <button class="rmv" onclick="exItems.splice(${i},1);renderExtracted()">×</button>
      </div>
      <select onchange="exItems[${i}].category=this.value;renderExtracted()" style="background:var(--surface);border:1.5px solid var(--border);border-radius:7px;color:var(--text);padding:8px 10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;width:100%;font-weight:600;margin-top:8px;">
        <option value="COGS" ${item.category==='COGS'?'selected':''}>📦 COGS — Ingredients / Packaging</option>
        <option value="Equipment" ${item.category==='Equipment'?'selected':''}>🔧 Equipment / Asset</option>
        <option value="OPEX" ${item.category==='OPEX'?'selected':''}>📋 Operational Expense</option>
      </select>
      ${unitHtml}`;
    el.appendChild(d);
  });
  document.getElementById('extracted').style.display = exItems.length ? 'block' : 'none';
  calcTotal();
}

// ─── MANUAL ROWS ─────────────────────────────────────────────────────────────
function addRow() {
  const c = document.getElementById('manual-rows');
  const d = document.createElement('div');
  d.className = 'mr';
  d.innerHTML = `
    <input type="text" placeholder="Item name" class="mn" oninput="calcTotal()">
    <input type="number" placeholder="Qty" class="mq" value="1" min="1" oninput="calcTotal()">
    <input type="number" placeholder="Price (Rp)" class="mp" min="0" oninput="calcTotal()">
    <select class="mc"><option value="COGS">📦 COGS</option><option value="Equipment">🔧 Equipment</option><option value="OPEX">📋 OPEX</option></select>
    <button class="rmv" onclick="rmRow(this)">×</button>`;
  c.appendChild(d);
}
function rmRow(btn) {
  const rows = document.querySelectorAll('.mr');
  if (rows.length > 1) { btn.closest('.mr').remove(); calcTotal(); }
}

// ─── TOTAL ───────────────────────────────────────────────────────────────────
function calcTotal() {
  let t = 0;
  if (mode === 'photo') {
    t = exItems.reduce((s,i) => s + (i.qty||0)*(i.price||0), 0);
  } else {
    document.querySelectorAll('.mr').forEach(r => {
      t += (parseFloat(r.querySelector('.mq')?.value)||0) * (parseFloat(r.querySelector('.mp')?.value)||0);
    });
  }
  document.getElementById('tot').textContent = 'Rp ' + fmt(t);
}

// ─── SAVE ────────────────────────────────────────────────────────────────────
async function savePurchase() {
  const date = document.getElementById('p-date').value;
  const supplier = document.getElementById('p-sup').value || 'Unknown';
  const notes = document.getElementById('p-notes').value;

  let items = [];
  if (mode === 'photo') {
    items = exItems.filter(i => i.name?.trim());
    if (!items.length) { showMsg('err','⚠️ No items to save. Analyze a screenshot first.'); return; }
  } else {
    document.querySelectorAll('.mr').forEach(r => {
      const name = r.querySelector('.mn')?.value?.trim();
      const qty = parseInt(r.querySelector('.mq')?.value)||1;
      const price = parseInt(r.querySelector('.mp')?.value)||0;
      const category = r.querySelector('.mc')?.value || 'COGS';
      if (name) items.push({name,qty,price,category});
    });
    if (!items.length) { showMsg('err','⚠️ Fill in at least one item.'); return; }
  }
  if (!date) { showMsg('err','⚠️ Select a purchase date.'); return; }

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Saving…';

  try {
    await dbInsert('purchases', {
      id: Date.now().toString(),
      brand,
      date,
      supplier,
      notes,
      items,
      total: items.reduce((s,i) => s + i.qty*i.price, 0)
    });
    // Save last buy prices for COGS items
    await saveLastBuyPrices(items);
    showMsg('ok','✅ Purchase saved!');
    resetLog();
    loadHistory(); loadSummary();
    setTimeout(hideMsg, 3000);
  } catch(e) {
    showMsg('err','❌ Save failed: ' + e.message);
    console.error(e);
  }
  btn.disabled = false;
  btn.innerHTML = '💾 Save Purchase';
}

async function resetLog() {
  imgData = null; exItems = []; pendingImages = [];
  document.getElementById('preview-wrap').style.display = 'none';
  document.getElementById('upzone').style.display = 'block';
  document.getElementById('extracted').style.display = 'none';
  document.getElementById('analyze-btn').disabled = false;
  document.getElementById('analyze-btn').innerHTML = '✨ Analyze with AI';
  await loadSupplierDropdown();
  document.getElementById('p-notes').value = '';
  document.getElementById('p-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('manual-rows').innerHTML = `<div class="mr">
    <input type="text" placeholder="Item name" class="mn" oninput="calcTotal()">
    <input type="number" placeholder="Qty" class="mq" value="1" min="1" oninput="calcTotal()">
    <input type="number" placeholder="Price (Rp)" class="mp" min="0" oninput="calcTotal()">
    <select class="mc"><option value="COGS">📦 COGS</option><option value="Equipment">🔧 Equipment</option><option value="OPEX">📋 OPEX</option></select>
    <button class="rmv" onclick="rmRow(this)">×</button>
  </div>`;
  calcTotal();
}

// ─── HISTORY ─────────────────────────────────────────────────────────────────
async function loadHistory() {
  const from = document.getElementById('h-from').value;
  const to = document.getElementById('h-to').value;
  const el = document.getElementById('history-list');
  el.innerHTML = '<div class="empty"><span class="spin"></span></div>';
  try {
    let q = `brand=eq.${brand}&order=date.desc`;
    if (from) q += `&date=gte.${from}`;
    if (to)   q += `&date=lte.${to}`;
    const rows = await dbSelect('purchases', q);
    if (!rows.length) { el.innerHTML = '<div class="empty"><div class="ei">📭</div><p>No purchases found.</p></div>'; return; }
    el.innerHTML = '';
    rows.forEach(p => {
      const card = document.createElement('div');
      card.className = 'pcard';
      const items = Array.isArray(p.items) ? p.items : JSON.parse(p.items);
      card.innerHTML = `
        <div class="pcard-top">
          <span class="pdate">${fmtDate(p.date)}</span>
          <span class="ptotal">Rp ${fmt(p.total)}</span>
        </div>
        <div class="psup">🏪 ${esc(p.supplier||'')}${p.notes?' · '+esc(p.notes):''}</div>
        <div class="chips">
          ${items.slice(0,4).map(i=>`<span class="chip">${esc(i.name)}</span>`).join('')}
          ${items.length>4?`<span class="chip">+${items.length-4} more</span>`:''}
        </div>
        <div class="pdetail" id="det-${p.id}">
          <div style="height:6px;"></div>
          ${items.map(i=>`
            <div class="drow">
              <span>${esc(i.name)}</span>
              <span class="badge b-${i.category==='Equipment'?'asset':i.category.toLowerCase()}">${i.category}</span>
              <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">×${i.qty}</span>
              <span style="font-family:'DM Mono',monospace;font-size:12px;">Rp ${fmt(i.qty*i.price)}</span>
            </div>`).join('')}
          <div style="height:8px;"></div>
          <button class="btn btn-d btn-s" onclick="delPurchase('${p.id}');event.stopPropagation()">🗑 Delete</button>
        </div>`;
      card.addEventListener('click', () => {
        document.getElementById(`det-${p.id}`).classList.toggle('open');
      });
      el.appendChild(card);
    });
  } catch(e) {
    el.innerHTML = `<div class="empty"><p>❌ Error loading: ${e.message}</p></div>`;
  }
}

async function delPurchase(id) {
  if (!confirm('Delete this purchase?')) return;
  try {
    await dbDelete('purchases', `id=eq.${id}`);
    loadHistory(); loadSummary();
  } catch(e) { alert('Delete failed: '+e.message); }
}

// ─── SUMMARY ─────────────────────────────────────────────────────────────────
async function loadSummary() {
  const from = document.getElementById('s-from').value;
  const to   = document.getElementById('s-to').value;
  const el   = document.getElementById('summary-out');
  try {
    let q = `brand=eq.${brand}`;
    if (from) q += `&date=gte.${from}`;
    if (to)   q += `&date=lte.${to}`;
    const rows = await dbSelect('purchases', q);
    const allItems = rows.flatMap(p => Array.isArray(p.items)?p.items:JSON.parse(p.items));
    const sum = cat => allItems.filter(i=>i.category===cat).reduce((s,i)=>s+i.qty*i.price,0);
    const cogs = sum('COGS'), asset = sum('Equipment'), opex = sum('OPEX');
    const grand = cogs+asset+opex;

    const map = {};
    allItems.forEach(i => {
      const k = i.name+'|'+i.category;
      if (!map[k]) map[k]={name:i.name,category:i.category,qty:0,total:0};
      map[k].qty+=i.qty; map[k].total+=i.qty*i.price;
    });
    const breakdown = Object.values(map).sort((a,b)=>b.total-a.total);

    el.innerHTML = `
      <div class="sg">
        <div class="scard" style="grid-column:1/-1;background:var(--light);border-color:var(--mid);">
          <div class="slbl">Grand Total (${rows.length} purchases)</div>
          <div class="sval t">Rp ${fmt(grand)}</div>
        </div>
        <div class="scard"><div class="slbl">COGS</div><div class="sval c">Rp ${fmt(cogs)}</div></div>
        <div class="scard"><div class="slbl">Equipment</div><div class="sval a">Rp ${fmt(asset)}</div></div>
        <div class="scard" style="grid-column:1/-1"><div class="slbl">OPEX</div><div class="sval o">Rp ${fmt(opex)}</div></div>
      </div>
      ${breakdown.length ? `
        <p class="sec">Item Breakdown</p>
        ${breakdown.map(i=>`
          <div class="irow">
            <div>
              <div class="iname">${esc(i.name)}</div>
              <div style="display:flex;gap:6px;align-items:center;margin-top:4px;">
                <span class="badge b-${i.category==='Equipment'?'asset':i.category.toLowerCase()}">${i.category}</span>
                <span style="font-size:11px;color:var(--muted);">qty: ${i.qty}</span>
              </div>
            </div>
            <span style="font-family:'DM Mono',monospace;font-size:14px;color:var(--accent)">Rp ${fmt(i.total)}</span>
          </div>`).join('')}` :
        '<div class="empty"><div class="ei">📊</div><p>No data for this period.</p></div>'}`;
  } catch(e) {
    el.innerHTML = `<div class="empty"><p>❌ ${e.message}</p></div>`;
  }
}

// ─── ITEMS LIST ──────────────────────────────────────────────────────────────
let allCatalogRows = [];
let editingId = null;

async function loadItems() {
  const el = document.getElementById('items-list');
  el.innerHTML = '<div class="empty"><span class="spin"></span></div>';
  try {
    allCatalogRows = await dbSelect('catalog', `brand=eq.${brand}&order=name.asc`);
    renderItems();
  } catch(e) {
    el.innerHTML = `<div class="empty"><p>❌ ${e.message}</p></div>`;
  }
}

function renderItems() {
  const el = document.getElementById('items-list');
  const search = (document.getElementById('item-search')?.value || '').toLowerCase();
  const filterCat = document.getElementById('item-filter')?.value || '';

  let rows = allCatalogRows;
  if (search) rows = rows.filter(r => r.name.toLowerCase().includes(search));
  if (filterCat) rows = rows.filter(r => r.category === filterCat);

  const countEl = document.getElementById('item-count');
  if (countEl) countEl.textContent = `${rows.length} of ${allCatalogRows.length} items`;

  if (!rows.length) {
    el.innerHTML = allCatalogRows.length === 0
      ? '<div class="empty"><div class="ei">📋</div><p>No items yet.</p></div>'
      : '<div class="empty"><div class="ei">🔍</div><p>No items match your search.</p></div>';
    return;
  }

  el.innerHTML = rows.map(r => `
    <div class="irow">
      <div style="flex:1;min-width:0;">
        <div class="iname" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(r.name)}</div>
        <div style="margin-top:4px;">
          <span class="badge b-${r.category==='Equipment'?'asset':r.category.toLowerCase()}">${r.category}</span>
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0;">
        <button class="btn btn-g btn-s" onclick="openEdit(${r.id},'${esc(r.name)}','${r.category}')">✏️</button>
        <button class="btn btn-d btn-s" onclick="delItem(${r.id})">🗑</button>
      </div>
    </div>`).join('');
}

async function addItem() {
  const name = document.getElementById('ni-name').value.trim();
  const category = document.getElementById('ni-cat').value;
  if (!name) return;
  try {
    await dbInsert('catalog', {brand, name, category});
    document.getElementById('ni-name').value = '';
    loadItems();
  } catch(e) { alert('Error: '+e.message); }
}

async function delItem(id) {
  if (!confirm('Remove this item?')) return;
  try { await dbDelete('catalog',`id=eq.${id}`); loadItems(); }
  catch(e) { alert('Error: '+e.message); }
}

function openEdit(id, name, category) {
  editingId = id;
  document.getElementById('edit-name').value = name;
  document.getElementById('edit-cat').value = category;
  const modal = document.getElementById('edit-modal');
  modal.style.display = 'flex';
}

function closeEdit() {
  editingId = null;
  document.getElementById('edit-modal').style.display = 'none';
}

async function saveEdit() {
  const name = document.getElementById('edit-name').value.trim();
  const category = document.getElementById('edit-cat').value;
  if (!name || !editingId) return;
  try {
    await sbFetch(`catalog?id=eq.${editingId}`, {
      method: 'PATCH',
      prefer: 'return=representation',
      body: JSON.stringify({name, category})
    });
    closeEdit();
    loadItems();
  } catch(e) { alert('Save failed: '+e.message); }
}

// ─── SUPPLIERS ───────────────────────────────────────────────────────────────
async function loadSupplierDropdown(selectName='') {
  try {
    const sups = await dbSelect('suppliers','order=name.asc');
    const sel = document.getElementById('p-sup');
    const current = selectName || sel.value;
    sel.innerHTML = '<option value="">— Select Supplier —</option>';
    sups.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.name;
      opt.textContent = s.name + (s.note ? ` (${s.note})` : '');
      if (s.name === current) opt.selected = true;
      sel.appendChild(opt);
    });
  } catch(e) { console.warn('supplier load:', e); }
}

function openAddSupplier(suggestedName='') {
  document.getElementById('new-sup-name').value = suggestedName;
  document.getElementById('new-sup-note').value = '';
  document.getElementById('supplier-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('new-sup-name').focus(), 100);
}

function closeSupplier() {
  document.getElementById('supplier-modal').style.display = 'none';
}

async function saveSupplier() {
  const name = document.getElementById('new-sup-name').value.trim();
  const note = document.getElementById('new-sup-note').value.trim();
  if (!name) return;
  try {
    await dbInsert('suppliers', {name, note});
    closeSupplier();
    await loadSupplierDropdown(name);
  } catch(e) { alert('Error saving supplier: '+e.message); }
}

// ─── LAST BUY PRICE ───────────────────────────────────────────────────────────
async function getLastBuyPrice(itemName) {
  // Returns {price_per_g: X, unit_g: X, last_total: X, last_date: ''} or null
  try {
    const rows = await dbSelect('last_buy_price', `item_name=eq.${encodeURIComponent(itemName)}&brand=eq.${brand}&limit=1`);
    return rows.length ? rows[0] : null;
  } catch(e) { return null; }
}

async function saveLastBuyPrices(items) {
  for (const item of items) {
    if (!item.name || !item.price || item.category !== 'COGS') continue;
    try {
      // price_per_g = total / (qty_g) — we store total and unit_g from item
      const unitG = item.unit_g || null;
      const pricePerG = unitG ? (item.price / unitG) : null;
      // Upsert by item_name + brand
      await sbFetch(`last_buy_price?item_name=eq.${encodeURIComponent(item.name)}&brand=eq.${brand}`, {
        method: 'DELETE'
      });
      await dbInsert('last_buy_price', {
        item_name: item.name,
        brand,
        last_total: item.price,
        unit_g: unitG,
        price_per_g: pricePerG,
        last_date: document.getElementById('p-date').value
      });
    } catch(e) { console.warn('save price:', e); }
  }
}

// ─── PDF SUPPORT ──────────────────────────────────────────────────────────────
async function pdfToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function fmt(n) { return Math.round(n).toLocaleString('id-ID'); }
function fmtDate(d) { return new Date(d+'T00:00:00').toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showMsg(type,text) { const e=document.getElementById('status'); e.className=`msg ${type}`; e.textContent=text; e.style.display='block'; }
function hideMsg() { document.getElementById('status').style.display='none'; }
</script>
